### =============================================================================
### LlamaFactory v0.9.4.dev0 — LoRA SFT 训练配置（意图识别分类任务）
### 适用硬件：4 × V100 (16GB)，总显存 64GB
### 任务：寿险意图 / 拒识 二分类
### 工作目录：/workspace/lora-intent-clf
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model)
### ---------------------------------------------------------------------------

# 模型名称或本地路径
# 含义：HuggingFace Hub 上的模型标识 或 本地/挂载路径的绝对路径
# 理由：Qwen3-8B 基座模型通过 ANS 网盘挂载（只读），直接读取挂载路径，无需拷贝
# 可选项：任何 HuggingFace 支持的 causal LM，如 meta-llama/Meta-Llama-3-8B-Instruct,
#         Qwen/Qwen2.5-7B-Instruct, baichuan-inc/Baichuan2-7B-Chat 等
# 挂载路径说明：/mnt/llm-ehpc-vo1633083-ro 为只读 ANS 挂载点
model_name_or_path: /mnt/llm-ehpc-vo1633083-ro/llm_model/Qwen3-8B

### ---------------------------------------------------------------------------
### 训练方法 (Method)
### ---------------------------------------------------------------------------

# 训练阶段
# 含义：指定当前训练的阶段类型
# 理由：SFT（Supervised Fine-Tuning）是分类微调的标准阶段
# 可选项：pt（预训练）, sft（监督微调）, rm（奖励模型）, ppo, dpo, kto, simpo
stage: sft

# 是否执行训练
# 含义：设为 true 表示执行训练流程
# 理由：必须开启，否则不会进行训练
do_train: true

# 微调类型
# 含义：选择参数高效微调的方法
# 理由：LoRA 在 4×V100 上可以高效微调 8B 模型，显存占用远小于全参数微调
# 可选项：lora（LoRA 适配器）, freeze（冻结部分层）, full（全参数微调）
finetuning_type: lora

# LoRA 目标模块
# 含义：指定 LoRA 适配器要插入的模块
# 理由：all 表示对所有线性层都插入 LoRA 适配器，效果通常优于仅选择部分模块
# 可选项：all（所有线性层）, q_proj,v_proj（仅 QV 注意力投影）,
#         q_proj,k_proj,v_proj,o_proj（所有注意力投影）,
#         gate_proj,up_proj,down_proj（MLP 层）
lora_target: all

# LoRA 秩 (rank)
# 含义：LoRA 低秩矩阵的秩大小，决定了可训练参数量
# 理由：16 是经验上的平衡点，对分类任务足够；增大可提升表达能力但增加显存
# 可选项：8, 16, 32, 64, 128（越大参数越多，效果可能越好但显存消耗也越大）
lora_rank: 16

# LoRA 缩放因子 (alpha)
# 含义：LoRA 的缩放系数，实际缩放比例 = lora_alpha / lora_rank
# 理由：通常设为 rank 的 2 倍，即缩放比例为 2.0，这是经验上效果较好的设置
# 可选项：通常为 lora_rank 的 1~2 倍，如 16, 32, 64
lora_alpha: 32

# LoRA Dropout
# 含义：LoRA 层的 dropout 比率，用于防止过拟合
# 理由：分类任务数据集通常较小，适当 dropout 有助于泛化
# 可选项：0.0（无 dropout）, 0.05, 0.1, 0.2
lora_dropout: 0.05

### ---------------------------------------------------------------------------
### 数据集配置 (Dataset)
### ---------------------------------------------------------------------------
###
### ⚠️ 重要：dataset_dir 和 dataset 的关系说明
###
### LlamaFactory 加载数据的流程如下：
###
###   1. 根据 dataset_dir 找到 dataset_info.json 文件
###      → LlamaFactory 会在 dataset_dir 目录下查找名为 dataset_info.json 的文件
###      → 路径拼接为: {dataset_dir}/dataset_info.json
###      → 所以 dataset_dir 必须是包含 dataset_info.json 的目录
###
###   2. 根据 dataset 参数在 dataset_info.json 中查找数据集定义
###      → dataset 的值（如 intent_clf_train）是 dataset_info.json 中的 key
###      → 可以用逗号分隔多个数据集名称，如 dataset1,dataset2
###
###   3. 根据数据集定义中的 file_name 字段加载实际数据文件
###      → 如果 file_name 是相对路径：相对于 dataset_dir 进行拼接
###        例如 dataset_dir=/workspace/lora-intent-clf/data, file_name=train.json
###        → 实际路径: /workspace/lora-intent-clf/data/train.json
###      → 如果 file_name 是绝对路径：直接使用该绝对路径
###        例如 file_name=/workspace/lora-intent-clf/data/train.json
###        → 直接加载
###
### 因此配置要点：
###   - dataset_dir 必须使用绝对路径（避免因执行目录不同导致找不到文件）
###   - dataset_info.json 必须放在 dataset_dir 指定的目录下
###   - file_name 推荐使用相对于 dataset_dir 的路径，或者使用绝对路径
###
### 本项目的配置：
###   dataset_dir: /workspace/lora-intent-clf/data
###   → LlamaFactory 会加载 /workspace/lora-intent-clf/data/dataset_info.json
###   → dataset_info.json 中的 file_name 使用相对路径（如 train.json）
###   → 实际加载: /workspace/lora-intent-clf/data/train.json
###

# 训练数据集名称
# 含义：在 dataset_info.json 中注册的数据集名称（JSON 的 key）
# 理由：使用自定义的意图分类训练集
# 可选项：可以逗号分隔多个数据集名称，如 intent_clf_train,other_dataset
# 注意：这里只指定训练集，验证集通过下方的 eval_dataset 单独指定
dataset: intent_clf_train

# 验证数据集名称
# 含义：在 dataset_info.json 中注册的验证数据集名称
# 理由：使用单独的验证集进行训练过程中的评估，而不是从训练集中随机划分
# 注意：如果指定了 eval_dataset，则下面的 val_size 参数将被忽略
#       测试集（intent_clf_test）不在训练中使用，而是在训练完成后
#       通过 llamafactory-cli chat 或 Python 评估脚本单独评估
eval_dataset: intent_clf_val

# 数据集目录（⚠️ 必须使用绝对路径）
# 含义：dataset_info.json 所在的目录路径
# 理由：LlamaFactory 会在此目录下查找 dataset_info.json，然后根据其中的
#       file_name 字段定位实际的数据文件
# ⚠️ 警告：如果使用相对路径（如 . 或 ./data），当你的执行目录不是项目根目录时
#          会报错 "No such file or directory './dataset_info.json'"
#          所以这里必须使用绝对路径！
# 路径关系：
#   dataset_dir = /workspace/lora-intent-clf/data
#   → 加载 /workspace/lora-intent-clf/data/dataset_info.json
#   → 再根据 dataset_info.json 中的 file_name 加载数据文件
dataset_dir: /workspace/lora-intent-clf/data

# 对话模板
# 含义：选择与模型匹配的对话模板格式
# 理由：Qwen3 使用 qwen 模板（适用于 Qwen 系列所有模型）
# 可选项：qwen（Qwen 系列）, llama3（Llama3）, chatglm4（GLM4）,
#         baichuan2（百川2）, default（通用默认模板）
template: qwen

# 最大序列长度
# 含义：输入序列的最大 token 数，超过此长度的序列会被截断
# 理由：分类任务输入通常较短，512 足够覆盖绝大多数意图文本；
#       较短的 cutoff_len 可以节省显存并加速训练
# 可选项：256, 512, 1024, 2048（根据实际输入长度调整）
cutoff_len: 512

# 最大样本数
# 含义：每个数据集最多使用的样本数量
# 理由：设为较大值以使用所有数据。如果数据集很大可以设置一个较小值用于快速实验
# 可选项：100（快速调试）, 1000, 10000, 999999999（使用全部数据）
max_samples: 999999999

# 是否覆盖缓存
# 含义：如果为 true，则每次都重新处理数据集，忽略之前的缓存
# 理由：开发阶段数据可能频繁变化，建议开启；生产环境可关闭以加速启动
# 可选项：true, false
overwrite_cache: true

# 数据预处理线程数
# 含义：用于数据集预处理（tokenization 等）的并行线程数
# 理由：16 可以加速数据预处理，根据 CPU 核心数调整
# 可选项：1, 4, 8, 16, 32
preprocessing_num_workers: 16

### ---------------------------------------------------------------------------
### 输出配置 (Output)
### ---------------------------------------------------------------------------

# 输出目录（使用绝对路径）
# 含义：训练产出（checkpoint、日志、loss 图）的保存路径
# 理由：按照 模型/方法/阶段 的层级组织，方便管理多次实验
output_dir: /workspace/lora-intent-clf/saves/qwen3-8b/lora/sft

# 日志记录间隔
# 含义：每隔多少个训练步骤记录一次日志（loss 等指标）
# 理由：10 步记录一次，频率适中，可以观察训练趋势又不会产生过多日志
# 可选项：1, 5, 10, 50, 100
logging_steps: 10

# 模型保存间隔
# 含义：每隔多少个训练步骤保存一次 checkpoint
# 理由：500 步保存一次，避免训练中断丢失进度
# 可选项：100, 500, 1000（数据集大时可以增大间隔）
save_steps: 500

# 最大保存数量
# 含义：最多保留多少个 checkpoint（旧的会被自动删除）
# 理由：保留 3 个 checkpoint 以节省磁盘空间
# 可选项：1, 2, 3, 5, 10
save_total_limit: 3

# 绘制训练 loss 曲线
# 含义：训练结束后在输出目录中生成 loss 变化图
# 理由：方便直观观察训练过程是否收敛
# 可选项：true, false
plot_loss: true

# 是否覆盖输出目录
# 含义：如果输出目录已存在，是否覆盖
# 理由：开发阶段频繁实验时建议开启，避免手动清理
# 可选项：true, false
overwrite_output_dir: true

# 日志输出目标
# 含义：除了控制台之外，还将日志输出到哪些平台
# 理由：集成 TensorBoard 2.9.0 以提供丰富的训练可视化
# 可选项：tensorboard, wandb, mlflow, none（可逗号分隔多个）
report_to: tensorboard

### ---------------------------------------------------------------------------
### 训练超参数 (Training Hyperparameters)
### ---------------------------------------------------------------------------

# 每设备训练批次大小
# 含义：每块 GPU 每步处理的样本数
# 理由：V100 16GB 显存有限，batch_size=2 配合梯度累积可实现较大有效批次
# 可选项：1, 2, 4, 8（显存不足时减小）
per_device_train_batch_size: 2

# 梯度累积步数
# 含义：累积多少个 mini-batch 后再执行一次参数更新
# 理由：4 张 GPU × batch_size 2 × accumulation 4 = 有效 batch_size 32
#       较大的有效批次有助于稳定训练
# 可选项：1, 2, 4, 8, 16
gradient_accumulation_steps: 4

# 学习率
# 含义：优化器的初始学习率
# 理由：1e-4 是 LoRA 微调的常用学习率；分类任务可适当增大
# 可选项：5e-5, 1e-4, 2e-4, 5e-4（LoRA 通常用 1e-4 ~ 5e-4）
learning_rate: 1.0e-4

# 训练轮数
# 含义：在整个训练集上迭代的轮数
# 理由：分类任务数据量不大时，5 轮通常可以充分收敛
# 可选项：1, 3, 5, 10, 20（数据量大时减小，小时增大）
num_train_epochs: 5.0

# 学习率调度器
# 含义：学习率随训练进度的变化策略
# 理由：cosine 调度器在训练后期平滑降低学习率，有助于收敛
# 可选项：linear, cosine, cosine_with_restarts, polynomial, constant,
#         constant_with_warmup
lr_scheduler_type: cosine

# 预热比例
# 含义：学习率从 0 线性增长到初始值所占的训练步骤比例
# 理由：0.1（10%）的预热期有助于训练初期的稳定性
# 可选项：0.0（无预热）, 0.05, 0.1, 0.2
warmup_ratio: 0.1

# 权重衰减
# 含义：L2 正则化系数，防止过拟合
# 理由：0.01 是常用的权重衰减值
# 可选项：0.0, 0.001, 0.01, 0.1
weight_decay: 0.01

# 最大梯度范数
# 含义：梯度裁剪的最大范数值，防止梯度爆炸
# 理由：1.0 是 transformer 训练的标准设置
# 可选项：0.5, 1.0, 2.0, 5.0
max_grad_norm: 1.0

# 混合精度训练
# 含义：使用 FP16 半精度训练以减少显存占用并加速计算
# 理由：V100 原生支持 FP16（不支持 BF16），使用 fp16 可以显著减少显存占用
# 注意：V100 不支持 bf16，必须使用 fp16；A100/H100 可以使用 bf16
# 可选项：true（使用 fp16）/ false（使用 fp32）
fp16: true

# 优化器
# 含义：选择用于参数更新的优化算法
# 理由：adamw_torch 是 PyTorch 原生的 AdamW 实现，稳定可靠
# 可选项：adamw_torch, adamw_hf, adafactor, sgd, adam
optim: adamw_torch

# 随机种子
# 含义：用于实验可复现性的随机种子
# 理由：固定种子可以确保实验结果可复现
# 可选项：任意整数
seed: 42

# DDP 超时
# 含义：分布式训练（多 GPU）的通信超时时间（毫秒）
# 理由：大模型训练中某些步骤较慢，设置较大超时避免不必要的中断
# 可选项：1800000（30 分钟）, 180000000（默认）
ddp_timeout: 180000000

### ---------------------------------------------------------------------------
### 评估配置 (Evaluation)
### ---------------------------------------------------------------------------

# 验证集比例
# 含义：从训练集中划分多少比例的数据作为验证集
# ⚠️ 注意：当指定了 eval_dataset 时，此参数必须注释掉或删除！
#          LlamaFactory 不允许同时设置 eval_dataset 和 val_size，否则会报错：
#          "Cannot specify val_size if eval_dataset is not None"
# 使用场景：如果你没有单独的验证集文件，可以删除上方的 eval_dataset，
#           然后取消下面的注释，LlamaFactory 会自动从训练集中划分验证数据
# 可选项：0.0, 0.05, 0.1, 0.2
# val_size: 0.1

# 每设备评估批次大小
# 含义：每块 GPU 评估时每步处理的样本数
# 理由：评估不需要计算梯度，可以设置稍大的 batch_size
# 可选项：1, 2, 4, 8
per_device_eval_batch_size: 4

# 评估策略
# 含义：何时执行评估
# 理由：按步数评估可以更灵活地控制评估频率
# 可选项：steps（按步数）, epoch（按轮次）, no（不评估）
eval_strategy: steps

# 评估间隔
# 含义：每隔多少步执行一次评估
# 理由：与 save_steps 保持一致，方便在保存 checkpoint 时查看评估结果
# 可选项：100, 500, 1000（与 save_steps 一致为佳）
eval_steps: 500

### ---------------------------------------------------------------------------
### DeepSpeed 配置 (分布式训练)
### ---------------------------------------------------------------------------

# DeepSpeed 配置文件路径
# 含义：指定 DeepSpeed 的 JSON 配置文件，启用模型并行和显存优化
# 理由：Qwen3-8B 的 FP16 权重约 16GB，单张 V100 (16GB) 无法加载完整模型。
#       默认 DDP 模式下每张 GPU 都要加载完整模型副本，因此 OOM。
#       ZeRO-3 将模型参数、梯度、优化器状态分片到所有 GPU 上，
#       4 张 V100 各承担约 4GB 的模型权重，彻底解决显存不足问题。
# 可选项：
#   configs/deepspeed/ds_z3_config.json         — ZeRO-3 标准版（推荐，4×V100 够用）
#   configs/deepspeed/ds_z3_offload_config.json  — ZeRO-3 + CPU Offload（显存极端紧张时使用，
#                                                   会将部分参数和优化器状态卸载到 CPU 内存，
#                                                   速度较慢但显存占用最低）
# 注意：使用 DeepSpeed 时，LlamaFactory 会自动通过 torchrun 启动多 GPU 训练，
#       无需手动指定 FORCE_TORCHRUN 或修改启动命令，
#       直接 llamafactory-cli train 即可
deepspeed: /workspace/lora-intent-clf/configs/deepspeed/ds_z3_config.json

### ---------------------------------------------------------------------------
### 其他高级配置 (Advanced)
### ---------------------------------------------------------------------------

# 梯度检查点
# 含义：使用梯度检查点技术，用计算换显存
# 理由：8B 模型在 V100 上显存紧张，开启梯度检查点可以大幅减少显存占用
# 可选项：true, false
gradient_checkpointing: true

# 数据集是否打乱
# 含义：每个 epoch 开始时是否打乱训练数据顺序
# 理由：打乱数据有助于模型泛化
# 可选项：true, false
# 注意：LlamaFactory 默认即打乱，此处显式设置确保行为明确
