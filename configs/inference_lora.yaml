### =============================================================================
### LlamaFactory v0.9.4.dev0 — 推理配置（使用基座模型 + LoRA 适配器，未 export）
### 用途：在训练完成后、export 之前快速测试 LoRA 适配器效果
### 工作目录：/workspace/lora-intent-clf
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model)
### ---------------------------------------------------------------------------

# 基座模型名称或本地路径
# 含义：与训练时使用的基座模型完全一致
# 注意：本地路径
model_name_or_path: /workspace/Qwen3-8B  # ⚠️ 由 machine.env 覆盖 (MODEL_PATH)

# LoRA 适配器路径（使用绝对路径）
# 含义：训练输出的 LoRA 适配器目录
adapter_name_or_path: /workspace/lora-intent-clf/saves/qwen3-8b/lora/sft  # ⚠️ 由 machine.env 覆盖 (OUTPUT_DIR)

# 对话模板
# 含义：与训练时使用的模板完全一致
template: qwen

# 微调类型
# 含义：告诉 LlamaFactory 以 LoRA 方式加载适配器
finetuning_type: lora

### ---------------------------------------------------------------------------
### 系统提示词 (System Prompt) — 分类任务必须设置，否则模型不知道要分类
### ---------------------------------------------------------------------------

# 系统提示词（与 inference.yaml 保持完全一致）
system: "你是一个意图识别助手。请根据用户输入的文本，判断其意图类别。只能输出以下标签之一：寿险意图、拒识。"

### ---------------------------------------------------------------------------
### 推理参数 (Generation)
### ---------------------------------------------------------------------------

do_sample: false
max_new_tokens: 16
