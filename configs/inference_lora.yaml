### =============================================================================
### LlamaFactory v0.9.0 — 推理配置（使用基座模型 + LoRA 适配器，未 export）
### 用途：在训练完成后、export 之前快速测试 LoRA 适配器效果
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model)
### ---------------------------------------------------------------------------

# 基座模型名称或本地路径
# 含义：与训练时使用的基座模型完全一致
model_name_or_path: Qwen/Qwen3-8B

# LoRA 适配器路径
# 含义：训练输出的 LoRA 适配器目录
adapter_name_or_path: saves/qwen3-8b/lora/sft

# 对话模板
# 含义：与训练时使用的模板完全一致
template: qwen

# 微调类型
# 含义：告诉 LlamaFactory 以 LoRA 方式加载适配器
finetuning_type: lora
