### ---------------------------------------------------------------------------
### 模型配置 (Model)
### ---------------------------------------------------------------------------

# 基座模型名称或本地路径
# 含义：与训练时使用的基座模型完全一致
# 注意：使用 ANS 网盘挂载路径（只读）
model_name_or_path: /mnt/llm-ehpc/vo1633083-ro/llm_model/Qwen3-8B

# LoRA 适配器路径（使用绝对路径）
# 含义：训练输出的 LoRA 适配器目录
adapter_name_or_path: /workspace/lora-intent-clf/saves/qwen3-8b/lora/sft

# 对话模板
# 含义：与训练时使用的模板完全一致
template: qwen

# 微调类型
# 含义：告诉 LlamaFactory 以 LoRA 方式加载适配器
finetuning_type: lora
