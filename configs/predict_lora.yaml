### =============================================================================
### LlamaFactory v0.9.4.dev0 — 批量预测配置（测试集推理 + 生成预测文件）
###
### 用途：在测试集上批量运行推理，生成 generated_predictions.jsonl
###       然后用 src/evaluate.py 解析该文件，输出 accuracy / F1 / 分类报告
###
### 使用方式：
###   llamafactory-cli train /workspace/lora-intent-clf/configs/predict_lora.yaml
###   python src/evaluate.py --pred_file /workspace/lora-intent-clf/saves/qwen3-8b/lora/predict/generated_predictions.jsonl
###
### 注意：LlamaFactory 内置的 eval 指标（loss/perplexity）不适合分类任务评估，
###       本配置使用 do_predict + predict_with_generate 生成文本预测，
###       再由 evaluate.py 计算 accuracy / precision / recall / F1
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model)
### ---------------------------------------------------------------------------

model_name_or_path: /workspace/Qwen3-8B

adapter_name_or_path: /workspace/lora-intent-clf/saves/qwen3-8b/lora/sft

# 对话模板，必须与训练时一致
template: qwen

# 微调类型，必须与训练时一致
finetuning_type: lora

# 系统提示词（必须与 inference.yaml 完全一致，否则批量评估结果与在线推理不一致）
system: "你是一个意图识别助手。请根据用户输入的文本，判断其意图类别。只能输出以下标签之一：寿险意图、拒识。"

### ---------------------------------------------------------------------------
### 预测配置 (Predict)
### ---------------------------------------------------------------------------

# 阶段：使用 sft 阶段的 predict 功能（非 rm/ppo 等）
stage: sft

# 关闭训练，开启预测
do_train: false
do_predict: true

# 使用生成模式而非 teacher-forcing：
# true  → 模型自由生成文本（适合分类：输出标签文本）
# false → 计算 perplexity（不适合分类评估）
predict_with_generate: true

### ---------------------------------------------------------------------------
### 数据集配置 (Dataset)
### ---------------------------------------------------------------------------

# 使用测试集（dataset_info.json 中注册的名称）
dataset: intent_clf_test

# 数据集目录（绝对路径），内含 dataset_info.json
dataset_dir: /workspace/lora-intent-clf/data

# 最大序列长度，与训练保持一致
cutoff_len: 512

### ---------------------------------------------------------------------------
### 推理参数 (Generation)
### ---------------------------------------------------------------------------

# 生成时最大新 token 数
# 分类任务标签很短（"寿险意图" / "拒识"），8 个 token 已足够
# 设置过大会浪费推理时间
max_new_tokens: 16

# 推理时使用贪心解码（分类任务不需要采样）
do_sample: false
temperature: 1.0

### ---------------------------------------------------------------------------
### 计算配置 (Compute)
### ---------------------------------------------------------------------------

# 评估 batch 大小（推理时显存占用低于训练，可适当调大）
per_device_eval_batch_size: 8

# 使用 FP16（与训练一致，V100 不支持 BF16）
fp16: true

### ---------------------------------------------------------------------------
### 输出配置 (Output)
### ---------------------------------------------------------------------------

# 预测结果输出目录
# 运行后会生成：
#   output_dir/generated_predictions.jsonl  ← 主要文件，每行包含 predict 和 label
#   output_dir/predict_results.json         ← 汇总指标（仅含 BLEU 等，不含 F1）
output_dir: /workspace/lora-intent-clf/saves/qwen3-8b/lora/predict

# 不覆盖已有输出（设为 true 则每次都重新生成）
overwrite_output_dir: true
