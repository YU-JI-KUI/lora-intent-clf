### =============================================================================
### LlamaFactory v0.9.4.dev0 — LoRA Adapter 导出配置（合并适配器到基座模型）
### 注意：导出时 不要使用量化模型 或设置 quantization_bit，否则会导致精度丢失
### 工作目录：/workspace/lora-intent-clf
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model)
### ---------------------------------------------------------------------------

# 基座模型名称或本地路径
# 含义：与训练时使用的基座模型 完全一致，导出时将 LoRA 权重合并回该模型
# 理由：必须与训练配置中的 model_name_or_path 保持一致
# 注意：本地路径，确保与训练配置保持一致
model_name_or_path: /workspace/Qwen3-8B

# LoRA 适配器路径（使用绝对路径）
# 含义：训练输出的 LoRA 适配器目录路径
# 理由：指向训练配置中 output_dir 的实际输出路径
# 注意：可以指定多个适配器目录（逗号分隔）进行合并
adapter_name_or_path: /workspace/lora-intent-clf/saves/qwen3-8b/lora/sft

# 对话模板
# 含义：与训练时使用的模板 完全一致
# 理由：确保导出的模型 tokenizer 配置与训练时一致
template: qwen

# 微调类型
# 含义：与训练时使用的微调类型 完全一致
# 理由：告诉 LlamaFactory 加载 LoRA 适配器
finetuning_type: lora

### ---------------------------------------------------------------------------
### 导出配置 (Export)
### ---------------------------------------------------------------------------

# 导出目录（使用绝对路径）
# 含义：合并后的完整模型保存路径
# 理由：将 LoRA 适配器合并进基座模型后的输出目录
# 注意：导出后可以像普通 HuggingFace 模型一样加载和使用
export_dir: /workspace/lora-intent-clf/models/qwen3-8b-intent-clf

# 导出分片大小 (GB)
# 含义：每个模型分片文件的最大大小（单位 GB）
# 理由：2GB 适合大多数文件系统，方便传输和部署
# 可选项：1, 2, 4, 5（较小值生成更多分片文件）
export_size: 2

# 导出使用的设备
# 含义：执行模型合并时使用的设备
# 理由：使用 CPU 进行导出可以避免 GPU 显存不足的问题
#       对于 8B 模型，CPU 导出耗时几分钟，完全可接受
# 可选项：cpu（安全稳定）, auto（使用 GPU，速度更快但需要足够显存）
export_device: cpu

# 是否使用旧版格式
# 含义：是否使用旧版的 PyTorch bin 格式（而非 safetensors）
# 理由：false 使用 safetensors 格式，加载更安全更快
# 可选项：true（.bin 格式）, false（.safetensors 格式，推荐）
export_legacy_format: false
