### =============================================================================
### LlamaFactory v0.9.0 — 推理配置（使用导出后的合并模型）
### 用途：在 export 之后对合并模型进行基础测试验证
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model) — 方式一：使用导出后的合并模型（推荐）
### ---------------------------------------------------------------------------

# 合并模型路径
# 含义：指向 export_lora.yaml 导出的合并模型目录
# 理由：合并模型已包含 LoRA 权重，无需额外加载适配器，推理速度更快
# 注意：如果使用合并模型，不需要设置 adapter_name_or_path 和 finetuning_type
model_name_or_path: models/qwen3-8b-intent-clf

# 对话模板
# 含义：与训练时使用的模板 完全一致
# 理由：确保推理时的输入格式与训练时一致
template: qwen

### ---------------------------------------------------------------------------
### 模型配置 (Model) — 方式二：使用基座模型 + LoRA 适配器（可选，取消下方注释）
### ---------------------------------------------------------------------------
# 如果你不想导出合并模型，也可以直接加载基座模型 + LoRA 适配器进行推理：
# model_name_or_path: Qwen/Qwen3-8B
# adapter_name_or_path: saves/qwen3-8b/lora/sft
# template: qwen
# finetuning_type: lora

### ---------------------------------------------------------------------------
### 推理参数 (Generation)
### ---------------------------------------------------------------------------

# 温度 (Temperature)
# 含义：控制生成的随机性，越低越确定
# 理由：分类任务需要确定性输出，设为极低值
# 可选项：0.01~2.0（分类任务建议 0.01~0.1，创意生成建议 0.7~1.0）
# temperature: 0.01

# Top-p 采样
# 含义：只从概率累积达到 p 的 token 中采样
# 理由：分类任务输出固定，top_p 设为较低值减少随机性
# 可选项：0.1~1.0（分类任务建议 0.1~0.5）
# top_p: 0.1

# 最大生成长度
# 含义：模型生成的最大 token 数
# 理由：分类标签最多几个字（如"寿险意图"），16 token 绰绰有余
# 可选项：8, 16, 32, 64, 128
# max_new_tokens: 16
