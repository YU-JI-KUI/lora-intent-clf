### =============================================================================
### LlamaFactory v0.9.4.dev0 — 推理配置（使用导出后的合并模型）
### 用途：在 export 之后对合并模型进行基础测试验证
### 工作目录：/workspace/lora-intent-clf
### =============================================================================

### ---------------------------------------------------------------------------
### 模型配置 (Model) — 方式一：使用导出后的合并模型（推荐）
### ---------------------------------------------------------------------------

# 合并模型路径（使用绝对路径）
# 含义：指向 export_lora.yaml 导出的合并模型目录
# 理由：合并模型已包含 LoRA 权重，无需额外加载适配器，推理速度更快
# 注意：如果使用合并模型，不需要设置 adapter_name_or_path 和 finetuning_type
model_name_or_path: /workspace/lora-intent-clf/models/qwen3-8b-intent-clf

# 对话模板
# 含义：与训练时使用的模板 完全一致
# 理由：确保推理时的输入格式与训练时一致
template: qwen

### ---------------------------------------------------------------------------
### 模型配置 (Model) — 方式二：使用基座模型 + LoRA 适配器（可选，取消下方注释）
### ---------------------------------------------------------------------------
# 如果你不想导出合并模型，也可以直接加载基座模型 + LoRA 适配器进行推理：
# model_name_or_path: /workspace/Qwen3-8B
# adapter_name_or_path: /workspace/lora-intent-clf/saves/qwen3-8b/lora/sft
# template: qwen
# finetuning_type: lora

### ---------------------------------------------------------------------------
### 系统提示词 (System Prompt) — 分类任务必须设置，否则模型不知道要分类
### ---------------------------------------------------------------------------

# 系统提示词
# 含义：告诉模型它的角色和输出格式，等价于训练数据中每条样本的 instruction 字段
# 理由：训练时每条数据的 user 消息 = instruction + input，chat 界面只有 input，
#       需要通过 system 补回 instruction 的语义，否则模型会当普通聊天处理
# 注意：标签列表必须与训练数据中 instruction 完全一致，否则模型输出可能不匹配
system: "你是一个意图识别助手。请根据用户输入的文本，判断其意图类别。只能输出以下标签之一：寿险意图、拒识。"

### ---------------------------------------------------------------------------
### 推理参数 (Generation)
### ---------------------------------------------------------------------------

# 关闭随机采样，使用贪心解码（分类任务必须，保证输出确定且简短）
# 理由：do_sample=false → 每次输出固定，不会随机生成不同标签
do_sample: false

# 最大生成长度
# 含义：模型生成的最大 token 数
# 理由："寿险意图"约 4 token，"拒识" 2 token，16 绰绰有余且防止输出冗余内容
# 重要：必须设置，否则模型会在标签后继续生成解释性文字
max_new_tokens: 16

# 温度（do_sample=false 时此参数无效，保留仅供参考）
# temperature: 0.01
